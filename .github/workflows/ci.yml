name: build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate wrapper (if jar is not tracked)
        run: gradle wrapper --no-validate-url

      - name: Build
        run: ./gradlew build --refresh-dependencies
